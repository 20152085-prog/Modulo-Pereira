<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Proyecto</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:500px;
    box-shadow:0 0 30px rgba(0,0,0,.3);
}

h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

p{
    color:#cbd5e1;
    margin-bottom:25px;
}

button{
    border:none;
    padding:15px 30px;
    border-radius:50px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
    background:#3b82f6;
    color:white;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}

#mensaje{
    margin-top:25px;
    font-size:1.2rem;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <h1>🚀 Mi Primer Proyecto</h1>
    <p>Página creada con Spring Boot y HTML.</p>

    <button onclick="sorpresa()">
        Presióname
    </button>

    <div id="mensaje"></div>
</div>

<script>
function sorpresa(){

    const frases = [
        "🔥 Modo desarrollador activado",
        "⚡ Sistema funcionando correctamente",
        "🚀 Despegue exitoso",
        "💻 Código compilado sin errores",
        "🎉 Todo marcha perfecto",
        "😎 Proyecto listo para crecer"
    ];

    const numero = Math.floor(Math.random() * frases.length);

    document.getElementById("mensaje").innerHTML = frases[numero];
}
</script>

</body>
</html>
